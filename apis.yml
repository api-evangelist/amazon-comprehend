apis:
  - name: Amazon Comprehend API
    description: >-
      The Amazon Comprehend API provides programmatic access to natural language
      processing capabilities including sentiment analysis, entity recognition,
      key phrase extraction, language detection, topic modeling, PII detection,
      and syntax analysis for text documents. The API supports real-time and
      batch processing with 84 operations covering detection, async jobs, custom
      model training, and flywheel management for continuous learning.
