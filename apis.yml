description: >-
  Amazon Comprehend is a natural language processing (NLP) service that uses
  machine learning to uncover information in unstructured data. The service
  can identify critical elements in data, including references to language,
  people, and places. It provides entity recognition, sentiment analysis, key
  phrase extraction, language detection, topic modeling, PII detection, and
  custom classification capabilities for text documents at scale.
