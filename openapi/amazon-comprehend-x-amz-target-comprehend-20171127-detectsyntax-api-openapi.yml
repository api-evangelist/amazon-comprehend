    post:
      operationId: DetectSyntax
      description: 'Inspects text for syntax and the part of speech of words in the document. For more information, see <a href="https://docs.aws.amazon.com/comprehend/latest/dg/how-syntax.html">Syntax</a> in the Comprehend Developer Guide. '
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectSyntaxResponse'
              examples:
                DetectSyntax200Example:
                  summary: Default DetectSyntax 200
                  x-microcks-default: true
                  value:
                    SyntaxTokens: example
        '480':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
              examples:
                DetectSyntax480Example:
                  summary: Default DetectSyntax 480
                  x-microcks-default: true
                  value: example
        '481':
          description: TextSizeLimitExceededException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextSizeLimitExceededException'
              examples:
                DetectSyntax481Example:
                  summary: Default DetectSyntax 481
                  x-microcks-default: true
                  value: example
        '482':
          description: UnsupportedLanguageException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnsupportedLanguageException'
              examples:
                DetectSyntax482Example:
                  summary: Default DetectSyntax 482
                  x-microcks-default: true
                  value: example
        '483':
