components:
  schemas:
    ListOfSyntaxTokens:
      type: array
      items:
        $ref: '#/components/schemas/SyntaxToken'
    UnsupportedLanguageException: {}
    TextSizeLimitExceededException: {}
    SyntaxLanguageCode:
      type: string
      enum:
      - en
      - es
      - fr
      - de
      - it
      - pt
    PartOfSpeechTag:
      type: object
      properties:
        Tag:
          allOf:
          - $ref: '#/components/schemas/PartOfSpeechTagType'
          - description: Identifies the part of speech that the token represents.
        Score:
          allOf:
          - $ref: '#/components/schemas/Float'
          - description: The confidence that Amazon Comprehend has that the part of speech was correctly identified.
      description: 'Identifies the part of speech represented by the token and gives the confidence that Amazon Comprehend has that the part of speech was correctly identified. For more information about the parts of speech that Amazon Comprehend can identify, see <a href="https://docs.aws.amazon.com/comprehend/latest/dg/how-syntax.html">Syntax</a> in the Comprehend Developer Guide. '
    InvalidRequestException: {}
    Float:
      type: number
      format: float
    String:
      type: string
      minLength: 1
    PartOfSpeechTagType:
      type: string
      enum:
      - ADJ
      - ADP
      - ADV
      - AUX
      - CONJ
      - CCONJ
      - DET
      - INTJ
      - NOUN
      - NUM
      - O
      - PART
      - PRON
      - PROPN
      - PUNCT
      - SCONJ
      - SYM
      - VERB
    Integer:
      type: integer
    DetectSyntaxResponse:
      type: object
      properties:
        SyntaxTokens:
          allOf:
          - $ref: '#/components/schemas/ListOfSyntaxTokens'
          - description: 'A collection of syntax tokens describing the text. For each token, the response provides the text, the token type, where the text begins and ends, and the level of confidence that Amazon Comprehend has that the token is correct. For a list of token types, see <a href="https://docs.aws.amazon.com/comprehend/latest/dg/how-syntax.html">Syntax</a> in the Comprehend Developer Guide. '
    CustomerInputString:
      type: string
      minLength: 1
      format: password
    SyntaxToken:
      type: object
      properties:
        TokenId:
          allOf:
          - $ref: '#/components/schemas/Integer'
          - description: A unique identifier for a token.
        Text:
          allOf:
          - $ref: '#/components/schemas/String'
          - description: The word that was recognized in the source text.
        BeginOffset:
          allOf:
          - $ref: '#/components/schemas/Integer'
          - description: The zero-based offset from the beginning of the source text to the first character in the word.
        EndOffset:
          allOf:
          - $ref: '#/components/schemas/Integer'
          - description: The zero-based offset from the beginning of the source text to the last character in the word.
        PartOfSpeech:
          allOf:
          - $ref: '#/components/schemas/PartOfSpeechTag'
          - description: 'Provides the part of speech label and the confidence level that Amazon Comprehend has that the part of speech was correctly identified. For more information, see <a href="https://docs.aws.amazon.com/comprehend/latest/dg/how-syntax.html">Syntax</a> in the Comprehend Developer Guide. '
      description: Represents a work in the input text that was recognized and assigned a part of speech. There is one syntax token record for each word in the source text.
    InternalServerException: {}
    DetectSyntaxRequest:
      type: object
      required:
      - Text
      - LanguageCode
      title: DetectSyntaxRequest
      properties:
        Text:
          allOf:
          - $ref: '#/components/schemas/CustomerInputString'
          - description: A UTF-8 string. The maximum string size is 5 KB.
        LanguageCode:
          allOf:
          - $ref: '#/components/schemas/SyntaxLanguageCode'
          - description: 'The language code of the input documents. You can specify any of the following languages supported by Amazon Comprehend: German ("de"), English ("en"), Spanish ("es"), French ("fr"), Italian ("it"), or Portuguese ("pt").'
  parameters:
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Credential:
