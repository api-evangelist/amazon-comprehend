    post:
      operationId: StopTargetedSentimentDetectionJob
      description: <p>Stops a targeted sentiment detection job in progress.</p> <p>If the job state is <code>IN_PROGRESS</code>, the job is marked for termination and put into the <code>STOP_REQUESTED</code> state. If the job completes before it can be stopped, it is put into the <code>COMPLETED</code> state; otherwise the job is be stopped and put into the <code>STOPPED</code> state.</p> <p>If the job is in the <code>COMPLETED</code> or <code>FAILED</code> state when you call the <code>StopDominantLanguageDetectionJob</code> operation, the operation returns a 400 Internal Request Exception. </p> <p>When a job is stopped, any documents already processed are written to the output location.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StopTargetedSentimentDetectionJobResponse'
              examples:
                StopTargetedSentimentDetectionJob200Example:
                  summary: Default StopTargetedSentimentDetectionJob 200
                  x-microcks-default: true
                  value:
                    JobId: example
                    JobStatus: example
        '480':
          description: InvalidRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestException'
              examples:
                StopTargetedSentimentDetectionJob480Example:
                  summary: Default StopTargetedSentimentDetectionJob 480
                  x-microcks-default: true
                  value: example
        '481':
          description: JobNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobNotFoundException'
              examples:
                StopTargetedSentimentDetectionJob481Example:
                  summary: Default StopTargetedSentimentDetectionJob 481
                  x-microcks-default: true
                  value: example
        '482':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
              examples:
                StopTargetedSentimentDetectionJob482Example:
                  summary: Default StopTargetedSentimentDetectionJob 482
                  x-microcks-default: true
                  value: example
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StopTargetedSentimentDetectionJobRequest'
      parameters:
