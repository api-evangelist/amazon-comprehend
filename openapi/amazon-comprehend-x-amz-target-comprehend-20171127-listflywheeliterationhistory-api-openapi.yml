components:
  schemas:
    ComprehendModelArn:
      type: string
      pattern: arn:aws(-[^:]+)?:comprehend:[a-zA-Z0-9-]*:[0-9]{12}:(document-classifier|entity-recognizer)/[a-zA-Z0-9](-*[a-zA-Z0-9])*(/version/[a-zA-Z0-9](-*[a-zA-Z0-9])*)?
      maxLength: 256
    FlywheelIterationStatus:
      type: string
      enum:
      - TRAINING
      - EVALUATING
      - COMPLETED
      - FAILED
      - STOP_REQUESTED
      - STOPPED
    ResourceNotFoundException: {}
    AnyLengthString:
      type: string
    S3Uri:
      type: string
      pattern: s3://[a-z0-9][\.\-a-z0-9]{1,61}[a-z0-9](/.*)?
      maxLength: 1024
    InvalidFilterException: {}
    ListFlywheelIterationHistoryRequest:
      type: object
      required:
      - FlywheelArn
      title: ListFlywheelIterationHistoryRequest
      properties:
        FlywheelArn:
          allOf:
          - $ref: '#/components/schemas/ComprehendFlywheelArn'
          - description: The ARN of the flywheel.
        Filter:
          allOf:
          - $ref: '#/components/schemas/FlywheelIterationFilter'
          - description: Filter the flywheel iteration history based on creation time.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/String'
          - description: Next token
        MaxResults:
          allOf:
          - $ref: '#/components/schemas/MaxResultsInteger'
          - description: Maximum number of iteration history results to return
    FlywheelIterationPropertiesList:
      type: array
      items:
        $ref: '#/components/schemas/FlywheelIterationProperties'
    InvalidRequestException: {}
    String:
      type: string
      minLength: 1
    ComprehendFlywheelArn:
      type: string
      pattern: arn:aws(-[^:]+)?:comprehend:[a-zA-Z0-9-]*:[0-9]{12}:flywheel/[a-zA-Z0-9](-*[a-zA-Z0-9])*
      maxLength: 256
    Timestamp:
      type: string
      format: date-time
    Double:
      type: number
      format: double
    TooManyRequestsException: {}
    FlywheelIterationProperties:
      type: object
      properties:
        FlywheelArn:
          allOf:
          - $ref: '#/components/schemas/ComprehendFlywheelArn'
          - description: <p/>
        FlywheelIterationId:
          allOf:
          - $ref: '#/components/schemas/FlywheelIterationId'
          - description: <p/>
        CreationTime:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The creation start time of the flywheel iteration.
        EndTime:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The completion time of this flywheel iteration.
        Status:
          allOf:
          - $ref: '#/components/schemas/FlywheelIterationStatus'
          - description: The status of the flywheel iteration.
        Message:
          allOf:
          - $ref: '#/components/schemas/AnyLengthString'
          - description: A description of the status of the flywheel iteration.
        EvaluatedModelArn:
          allOf:
          - $ref: '#/components/schemas/ComprehendModelArn'
          - description: The ARN of the evaluated model associated with this flywheel iteration.
        EvaluatedModelMetrics:
          $ref: '#/components/schemas/FlywheelModelEvaluationMetrics'
        TrainedModelArn:
          allOf:
          - $ref: '#/components/schemas/ComprehendModelArn'
          - description: The ARN of the trained model associated with this flywheel iteration.
        TrainedModelMetrics:
          allOf:
          - $ref: '#/components/schemas/FlywheelModelEvaluationMetrics'
          - description: The metrics associated with the trained model.
        EvaluationManifestS3Prefix:
          allOf:
          - $ref: '#/components/schemas/S3Uri'
          - description: <p/>
      description: The configuration properties of a flywheel iteration.
    FlywheelIterationId:
      type: string
      pattern: '[0-9]{8}T[0-9]{6}Z'
      maxLength: 63
    FlywheelIterationFilter:
      type: object
      properties:
        CreationTimeAfter:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: Filter the flywheel iterations to include iterations created after the specified time.
        CreationTimeBefore:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: Filter the flywheel iterations to include iterations created before the specified time.
      description: Filter the flywheel iterations based on creation time.
    InternalServerException: {}
    FlywheelModelEvaluationMetrics:
      type: object
      properties:
        AverageF1Score:
          allOf:
          - $ref: '#/components/schemas/Double'
          - description: The average F1 score from the evaluation metrics.
        AveragePrecision:
          allOf:
          - $ref: '#/components/schemas/Double'
          - description: Average precision metric for the model.
        AverageRecall:
          allOf:
          - $ref: '#/components/schemas/Double'
          - description: Average recall metric for the model.
        AverageAccuracy:
          allOf:
          - $ref: '#/components/schemas/Double'
          - description: Average accuracy metric for the model.
      description: The evaluation metrics associated with the evaluated model.
    ListFlywheelIterationHistoryResponse:
      type: object
      properties:
        FlywheelIterationPropertiesList:
          allOf:
          - $ref: '#/components/schemas/FlywheelIterationPropertiesList'
          - description: List of flywheel iteration properties
        NextToken:
          allOf:
          - $ref: '#/components/schemas/String'
          - description: Next token
    MaxResultsInteger:
      type: integer
      minimum: 1
      maximum: 500
