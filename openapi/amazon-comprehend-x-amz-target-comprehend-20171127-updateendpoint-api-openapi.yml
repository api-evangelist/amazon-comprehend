components:
  schemas:
    IamRoleArn:
      type: string
      pattern: arn:aws(-[^:]+)?:iam::[0-9]{12}:role/.+
      minLength: 20
      maxLength: 2048
    ComprehendModelArn:
      type: string
      pattern: arn:aws(-[^:]+)?:comprehend:[a-zA-Z0-9-]*:[0-9]{12}:(document-classifier|entity-recognizer)/[a-zA-Z0-9](-*[a-zA-Z0-9])*(/version/[a-zA-Z0-9](-*[a-zA-Z0-9])*)?
      maxLength: 256
    ResourceLimitExceededException: {}
    ResourceNotFoundException: {}
    ResourceUnavailableException: {}
    InvalidRequestException: {}
    UpdateEndpointRequest:
      type: object
      required:
      - EndpointArn
      title: UpdateEndpointRequest
      properties:
        EndpointArn:
          allOf:
          - $ref: '#/components/schemas/ComprehendEndpointArn'
          - description: The Amazon Resource Number (ARN) of the endpoint being updated.
        DesiredModelArn:
          allOf:
          - $ref: '#/components/schemas/ComprehendModelArn'
          - description: The ARN of the new model to use when updating an existing endpoint.
        DesiredInferenceUnits:
          allOf:
          - $ref: '#/components/schemas/InferenceUnitsInteger'
          - description: ' The desired number of inference units to be used by the model using this endpoint. Each inference unit represents of a throughput of 100 characters per second.'
        DesiredDataAccessRoleArn:
          allOf:
          - $ref: '#/components/schemas/IamRoleArn'
          - description: Data access role ARN to use in case the new model is encrypted with a customer CMK.
        FlywheelArn:
          allOf:
          - $ref: '#/components/schemas/ComprehendFlywheelArn'
          - description: The Amazon Resource Number (ARN) of the flywheel
    UpdateEndpointResponse:
      type: object
      properties:
        DesiredModelArn:
          allOf:
          - $ref: '#/components/schemas/ComprehendModelArn'
          - description: The Amazon Resource Number (ARN) of the new model.
    ComprehendFlywheelArn:
      type: string
      pattern: arn:aws(-[^:]+)?:comprehend:[a-zA-Z0-9-]*:[0-9]{12}:flywheel/[a-zA-Z0-9](-*[a-zA-Z0-9])*
      maxLength: 256
    ResourceInUseException: {}
    ComprehendEndpointArn:
      type: string
      pattern: arn:aws(-[^:]+)?:comprehend:[a-zA-Z0-9-]*:[0-9]{12}:(document-classifier-endpoint|entity-recognizer-endpoint)/[a-zA-Z0-9](-*[a-zA-Z0-9])*
      maxLength: 256
    TooManyRequestsException: {}
    InferenceUnitsInteger:
      type: integer
      minimum: 1
    InternalServerException: {}
