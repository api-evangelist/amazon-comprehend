                  value: example
        '481':
          description: TooManyRequestsException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsException'
              examples:
                DescribeDocumentClassifier481Example:
                  summary: Default DescribeDocumentClassifier 481
                  x-microcks-default: true
