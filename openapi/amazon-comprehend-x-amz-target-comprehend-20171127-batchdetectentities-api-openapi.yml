components:
  schemas:
    ListOfChildBlocks:
      type: array
      items:
        $ref: '#/components/schemas/ChildBlock'
    LanguageCode:
      type: string
      enum:
      - en
      - es
      - fr
      - de
      - it
      - pt
      - ar
      - hi
      - ja
      - ko
      - zh
      - zh-TW
    BatchSizeLimitExceededException: {}
    UnsupportedLanguageException: {}
    BatchDetectEntitiesItemResult:
      type: object
      properties:
        Index:
          allOf:
          - $ref: '#/components/schemas/Integer'
          - description: The zero-based index of the document in the input list.
        Entities:
          allOf:
          - $ref: '#/components/schemas/ListOfEntities'
          - description: One or more <a>Entity</a> objects, one for each entity detected in the document.
      description: The result of calling the operation. The operation returns one object for each document that is successfully processed by the operation.
    TextSizeLimitExceededException: {}
    Entity:
      type: object
      properties:
        Score:
          allOf:
          - $ref: '#/components/schemas/Float'
          - description: The level of confidence that Amazon Comprehend has in the accuracy of the detection.
        Type:
          allOf:
          - $ref: '#/components/schemas/EntityType'
          - description: <p>The entity type. For entity detection using the built-in model, this field contains one of the standard entity types listed below.</p> <p>For custom entity detection, this field contains one of the entity types that you specified when you trained your custom model.</p>
        Text:
          allOf:
          - $ref: '#/components/schemas/String'
          - description: The text of the entity.
        BeginOffset:
          allOf:
          - $ref: '#/components/schemas/Integer'
          - description: <p>The zero-based offset from the beginning of the source text to the first character in the entity.</p> <p>This field is empty for non-text input.</p>
        EndOffset:
          allOf:
          - $ref: '#/components/schemas/Integer'
          - description: <p>The zero-based offset from the beginning of the source text to the last character in the entity.</p> <p>This field is empty for non-text input.</p>
        BlockReferences:
          allOf:
          - $ref: '#/components/schemas/ListOfBlockReferences'
          - description: A reference to each block for this entity. This field is empty for plain-text input.
      description: <p>Provides information about an entity. </p> <p> </p>
    ListOfEntities:
      type: array
      items:
        $ref: '#/components/schemas/Entity'
    BlockReference:
      type: object
      properties:
        BlockId:
          allOf:
          - $ref: '#/components/schemas/String'
          - description: Unique identifier for the block.
        BeginOffset:
          allOf:
          - $ref: '#/components/schemas/Integer'
          - description: Offset of the start of the block within its parent block.
        EndOffset:
          allOf:
          - $ref: '#/components/schemas/Integer'
          - description: Offset of the end of the block within its parent block.
        ChildBlocks:
          allOf:
          - $ref: '#/components/schemas/ListOfChildBlocks'
          - description: List of child blocks within this block.
      description: 'A reference to a block. '
    BatchDetectEntitiesRequest:
      type: object
      required:
      - TextList
      - LanguageCode
      title: BatchDetectEntitiesRequest
      properties:
        TextList:
          allOf:
          - $ref: '#/components/schemas/CustomerInputStringList'
          - description: A list containing the UTF-8 encoded text of the input documents. The list can contain a maximum of 25 documents. The maximum size of each document is 5 KB.
        LanguageCode:
          allOf:
          - $ref: '#/components/schemas/LanguageCode'
          - description: The language of the input documents. You can specify any of the primary languages supported by Amazon Comprehend. All documents must be in the same language.
    BatchDetectEntitiesResponse:
      type: object
      required:
      - ResultList
      - ErrorList
      properties:
        ResultList:
          allOf:
          - $ref: '#/components/schemas/ListOfDetectEntitiesResult'
          - description: A list of objects containing the results of the operation. The results are sorted in ascending order by the <code>Index</code> field and match the order of the documents in the input list. If all of the documents contain an error, the <code>ResultList</code> is empty.
        ErrorList:
          allOf:
          - $ref: '#/components/schemas/BatchItemErrorList'
          - description: A list containing one object for each document that contained an error. The results are sorted in ascending order by the <code>Index</code> field and match the order of the documents in the input list. If there are no errors in the batch, the <code>ErrorList</code> is empty.
    ListOfBlockReferences:
      type: array
      items:
        $ref: '#/components/schemas/BlockReference'
    InvalidRequestException: {}
    EntityType:
      type: string
      enum:
      - PERSON
      - LOCATION
      - ORGANIZATION
      - COMMERCIAL_ITEM
      - EVENT
      - DATE
      - QUANTITY
      - TITLE
      - OTHER
    Float:
      type: number
      format: float
    String:
      type: string
      minLength: 1
    CustomerInputStringList:
      type: array
      items:
        $ref: '#/components/schemas/CustomerInputString'
      minItems: 1
    ChildBlock:
      type: object
      properties:
        ChildBlockId:
          allOf:
          - $ref: '#/components/schemas/String'
          - description: Unique identifier for the child block.
        BeginOffset:
          allOf:
          - $ref: '#/components/schemas/Integer'
          - description: Offset of the start of the child block within its parent block.
        EndOffset:
          allOf:
          - $ref: '#/components/schemas/Integer'
          - description: Offset of the end of the child block within its parent block.
      description: Nested block contained within a block.
    BatchItemErrorList:
      type: array
      items:
        $ref: '#/components/schemas/BatchItemError'
    Integer:
      type: integer
    ListOfDetectEntitiesResult:
      type: array
      items:
        $ref: '#/components/schemas/BatchDetectEntitiesItemResult'
    CustomerInputString:
      type: string
      minLength: 1
      format: password
    BatchItemError:
      type: object
      properties:
        Index:
          allOf:
          - $ref: '#/components/schemas/Integer'
          - description: The zero-based index of the document in the input list.
        ErrorCode:
          allOf:
          - $ref: '#/components/schemas/String'
          - description: The numeric error code of the error.
        ErrorMessage:
          allOf:
          - $ref: '#/components/schemas/String'
          - description: A text description of the error.
      description: Describes an error that occurred while processing a document in a batch. The operation returns on <code>BatchItemError</code> object for each document that contained an error.
    InternalServerException: {}
